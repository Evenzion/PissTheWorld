<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Piss the World">
<title>Piss the World — 24h Karte</title>

<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="apple-touch-icon" sizes="167x167" href="icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="icon-120.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0f1416;
    --ink: #f5f0e6;
    --ink-dim: #a39d8f;
    --accent: #ff5b3a;
    --accent-soft: #ffb89a;
    --card: #1a2024;
    --border: #2a3036;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Fraunces', Georgia, serif;
    -webkit-font-smoothing: antialiased;
  }

  #map { position: absolute; inset: 0; z-index: 1; }

  .header {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: calc(var(--safe-top) + 14px) 18px 14px;
    z-index: 1000;
    background: linear-gradient(to bottom, rgba(15,20,22,0.9), rgba(15,20,22,0));
    pointer-events: none;
  }
  .brand { font-weight: 800; font-size: 22px; letter-spacing: -0.02em; font-style: italic; }
  .brand .dot { color: var(--accent); font-style: normal; }
  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .status {
    position: absolute;
    top: calc(var(--safe-top) + 16px);
    right: 16px;
    z-index: 1001;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.05em;
    pointer-events: none;
  }
  .status .count { color: var(--accent-soft); font-weight: 500; }

  .controls {
    position: absolute;
    bottom: calc(var(--safe-bottom) + 20px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    display: flex;
    gap: 10px;
  }

  .btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--ink);
    padding: 14px 20px;
    border-radius: 999px;
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    transition: transform 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #1a0d08; }
  .btn svg { width: 18px; height: 18px; }

  .modal-bg {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 2000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 { font-size: 24px; font-weight: 800; font-style: italic; letter-spacing: -0.02em; margin-bottom: 6px; }
  .modal .hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .modal input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--ink);
    padding: 14px 16px;
    border-radius: 12px;
    font-family: 'Fraunces', serif;
    font-size: 17px;
    outline: none;
  }
  .modal input[type="text"]:focus { border-color: var(--accent); }

  .photo-area {
    margin-top: 14px;
    border: 1px dashed var(--border);
    border-radius: 12px;
    padding: 22px 14px;
    text-align: center;
    cursor: pointer;
    background: var(--bg);
    transition: border-color 0.15s ease;
    position: relative;
    overflow: hidden;
  }
  .photo-area:hover { border-color: var(--accent); }
  .photo-area.has-photo { padding: 0; border-style: solid; border-color: var(--border); }
  .photo-area .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .photo-area .label svg { width: 22px; height: 22px; display: block; margin: 0 auto 6px; opacity: 0.6; }
  .photo-area img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
  }
  .photo-area .replace-tag {
    position: absolute;
    top: 8px; right: 8px;
    background: rgba(0,0,0,0.65);
    color: white;
    padding: 4px 10px;
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    pointer-events: none;
  }

  /* Schieberegler-Bereich */
  .slider-section {
    margin-top: 18px;
    padding: 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .slider-section .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
    text-align: center;
  }
  .preview-box {
    background: #0a0e10;
    border-radius: 10px;
    height: 110px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .preview-box svg { width: 100%; height: 100%; display: block; }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 10px;
  }
  .slider-row .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    min-width: 50px;
  }
  .slider-row input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--ink);
    border: 2px solid var(--card);
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  .slider-row input[type="range"]::-moz-range-thumb {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--ink);
    border: 2px solid var(--card);
    cursor: pointer;
    border: none;
  }
  /* Farbverlauf für den Farb-Slider */
  #colorSlider {
    background: linear-gradient(to right, #fff7a8, #f4d03f, #f39c12, #cd853f, #8b5a2b);
  }
  #strengthSlider {
    background: linear-gradient(to right, #2a3036, var(--ink-dim), var(--ink));
  }

  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
  .modal-actions .btn { flex: 1; justify-content: center; padding: 12px; }

  .pin-marker {
    width: 30px; height: 36px;
    position: relative;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.5));
  }
  .pin-marker svg { width: 100%; height: 100%; display: block; }

  .me-marker {
    width: 18px; height: 18px;
    background: #4a9eff;
    border: 3px solid white;
    border-radius: 50%;
    box-shadow: 0 0 0 8px rgba(74, 158, 255, 0.25);
    animation: pulse 2s infinite ease-out;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(74, 158, 255, 0.4); }
    100% { box-shadow: 0 0 0 16px rgba(74, 158, 255, 0); }
  }

  /* Vollbild-Foto-Viewer mit Infos */
  .lightbox {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.96);
    z-index: 3000;
    display: none;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    padding: calc(var(--safe-top) + 60px) 20px calc(var(--safe-bottom) + 80px);
  }
  .lightbox.show { display: flex; }
  .lightbox .photo-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .lightbox img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 12px;
  }
  .lightbox .no-photo {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 24px;
    text-align: center;
    color: var(--ink-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .lightbox .info {
    margin-top: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px;
    text-align: center;
  }
  .lightbox .info .lb-title {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .lightbox .info .lb-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.06em;
  }
  .lightbox .info .lb-delete {
    margin-top: 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-dim);
    padding: 8px 16px;
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
  }
  .lightbox .info .lb-delete:hover { color: var(--accent); border-color: var(--accent); }
  .lightbox .close {
    position: absolute;
    top: calc(var(--safe-top) + 16px);
    right: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--ink);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 22px;
    line-height: 1;
  }

  .toast {
    position: absolute;
    top: calc(var(--safe-top) + 70px);
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--ink);
    padding: 10px 18px;
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    z-index: 1500;
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="map"></div>

<div class="header">
  <div class="brand">Piss the World<span class="dot">.</span></div>
  <div class="subtitle">deine Welt · 24h sichtbar</div>
</div>

<div class="status">
  <span class="count" id="pinCount">0</span> aktive Pins
</div>

<div class="controls">
  <button class="btn" id="locateBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
    Standort
  </button>
  <button class="btn btn-primary" id="addBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    Pin setzen
  </button>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h2>Neuer Pin</h2>
    <div class="hint" id="modalCoords">Position wird ermittelt...</div>
    <input type="text" id="titleInput" placeholder="Was ist hier? (z.B. Café Mocca)" maxlength="60" autocomplete="off">

    <div class="photo-area" id="photoArea">
      <div class="label" id="photoLabel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 7h4l2-3h6l2 3h4v13H3z"/><circle cx="12" cy="13" r="4"/></svg>
        Foto hinzufügen (optional)
      </div>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none">

    <div class="slider-section">
      <div class="section-label">Deine Signatur</div>
      <div class="preview-box">
        <svg id="previewSvg" viewBox="0 0 300 110" preserveAspectRatio="xMidYMid meet">
          <!-- Männchen -->
          <circle cx="60" cy="28" r="10" fill="#f5f0e6"/>
          <path d="M53 41 L53 78 L57 78 L57 95 L64 95 L64 78 L67 78 L67 41 Z" fill="#f5f0e6"/>
          <path d="M67 50 L88 65 L84 70 L65 58 Z" fill="#f5f0e6"/>
          <path d="M53 50 L38 70 L42 74 L57 60 Z" fill="#f5f0e6"/>
          <!-- Strahl (wird per JS aktualisiert) -->
          <path id="previewBeam" d="" fill="none" stroke-linecap="round"/>
          <!-- Erde -->
          <circle cx="240" cy="80" r="22" fill="#3a5b8c"/>
          <path d="M222 75 Q230 68, 240 72 Q250 68, 258 78 Q252 88, 245 86 Q235 94, 225 88 Q218 82, 222 75 Z" fill="#5a8a4a"/>
        </svg>
      </div>
      <div class="slider-row">
        <span class="label">Farbe</span>
        <input type="range" id="colorSlider" min="0" max="100" value="30">
      </div>
      <div class="slider-row">
        <span class="label">Stärke</span>
        <input type="range" id="strengthSlider" min="0" max="100" value="60">
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn" id="cancelBtn">Abbrechen</button>
      <button class="btn btn-primary" id="saveBtn">Speichern</button>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="close" id="lightboxClose">×</button>
  <div class="photo-wrap" id="lbPhotoWrap"></div>
  <div class="info">
    <div class="lb-title" id="lbTitle"></div>
    <div class="lb-meta" id="lbMeta"></div>
    <button class="lb-delete" id="lbDelete">Pin löschen</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// === Speicher ===
const STORAGE_KEY = 'pinmap_pins_v3';
const TTL_MS = 24 * 60 * 60 * 1000;

function loadPins() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    const all = JSON.parse(raw);
    const now = Date.now();
    return all.filter(p => (now - p.createdAt) < TTL_MS);
  } catch (e) { return []; }
}
function savePins(pins) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(pins));
    return true;
  } catch (e) {
    toast('Speicher voll. Lösche alte Pins.');
    return false;
  }
}

// === Farbe-Helfer ===
// Mischt Farben entlang einer Skala 0..100: hellgelb → dunkelgelb → orange → braun
function urineColor(value) {
  // Stops: [Position, R, G, B]
  const stops = [
    [0,   255, 247, 168], // #fff7a8 hellgelb
    [33,  244, 208, 63],  // #f4d03f dunkelgelb
    [66,  243, 156, 18],  // #f39c12 orange
    [100, 139, 90, 43]    // #8b5a2b braun
  ];
  // Finde die zwei Stops, zwischen denen der Wert liegt
  for (let i = 0; i < stops.length - 1; i++) {
    if (value >= stops[i][0] && value <= stops[i+1][0]) {
      const t = (value - stops[i][0]) / (stops[i+1][0] - stops[i][0]);
      const r = Math.round(stops[i][1] + (stops[i+1][1] - stops[i][1]) * t);
      const g = Math.round(stops[i][2] + (stops[i+1][2] - stops[i][2]) * t);
      const b = Math.round(stops[i][3] + (stops[i+1][3] - stops[i][3]) * t);
      return `rgb(${r}, ${g}, ${b})`;
    }
  }
  return '#f4d03f';
}

// Strahl-Stärke 0..100 → Strichbreite in px (für Preview und Pin)
function beamWidth(value) {
  return 2 + (value / 100) * 10; // 2px bis 12px
}

// === Foto verkleinern ===
function compressImage(file, maxSize = 1280, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height) {
          if (width > maxSize) { height = height * (maxSize / width); width = maxSize; }
        } else {
          if (height > maxSize) { width = width * (maxSize / height); height = maxSize; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(width);
        canvas.height = Math.round(height);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => reject(new Error('Bild konnte nicht geladen werden'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('Datei konnte nicht gelesen werden'));
    reader.readAsDataURL(file);
  });
}

// === Karte ===
const map = L.map('map', { zoomControl: false }).setView([20, 10], 2);
L.control.zoom({ position: 'topright' }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  maxZoom: 19
}).addTo(map);

const pinMarkers = new Map();
let pins = loadPins();
let myMarker = null;
let myPosition = null;
let pendingPhoto = null;

// === Pin-Symbol mit Strahl & Farbe ===
function makePinIcon(pin) {
  const color = pin.color || '#f4d03f';
  const width = pin.strength != null ? beamWidth(pin.strength) : 6;
  // SVG-Pin mit Tropfen-Form, Farbe innen entspricht Urinfarbe
  // Tropfen-Größe innen skaliert mit Stärke (3-9 px)
  const innerSize = 3 + (pin.strength != null ? (pin.strength / 100) * 6 : 3);
  const html = `
    <div class="pin-marker">
      <svg viewBox="0 0 30 36">
        <path d="M15 2 C7 2 2 8 2 15 C2 24 15 34 15 34 C15 34 28 24 28 15 C28 8 23 2 15 2 Z"
              fill="${color}" stroke="#0f1416" stroke-width="2"/>
        <ellipse cx="15" cy="14" rx="${innerSize}" ry="${innerSize * 1.3}" fill="#0f1416" opacity="0.6"/>
      </svg>
    </div>
  `;
  return L.divIcon({
    className: '',
    html: html,
    iconSize: [30, 36],
    iconAnchor: [15, 34]
  });
}

function makeMeIcon() {
  return L.divIcon({
    className: '',
    html: '<div class="me-marker"></div>',
    iconSize: [18, 18],
    iconAnchor: [9, 9]
  });
}

function formatTime(ts) {
  return new Date(ts).toLocaleString('de-DE', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
}
function timeLeft(createdAt) {
  const ms = TTL_MS - (Date.now() - createdAt);
  if (ms <= 0) return 'abgelaufen';
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  return `noch ${h}h ${m}m`;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Beim Antippen direkt Vollbild öffnen
function renderPin(pin) {
  const m = L.marker([pin.lat, pin.lng], { icon: makePinIcon(pin) }).addTo(map);
  m.on('click', () => openLightbox(pin.id));
  pinMarkers.set(pin.id, m);
}

function refreshAll() {
  const now = Date.now();
  const fresh = pins.filter(p => (now - p.createdAt) < TTL_MS);
  for (const [id, marker] of pinMarkers) {
    if (!fresh.find(p => p.id === id)) {
      map.removeLayer(marker);
      pinMarkers.delete(id);
    }
  }
  for (const p of fresh) {
    if (!pinMarkers.has(p.id)) renderPin(p);
  }
  pins = fresh;
  savePins(pins);
  document.getElementById('pinCount').textContent = pins.length;
}

// === Lightbox: Foto direkt im Vollbild + Infos ===
let currentLightboxId = null;

window.openLightbox = function(id) {
  const pin = pins.find(p => p.id === id);
  if (!pin) return;
  currentLightboxId = id;
  const wrap = document.getElementById('lbPhotoWrap');
  if (pin.photo) {
    wrap.innerHTML = `<img src="${pin.photo}" alt="">`;
  } else {
    wrap.innerHTML = '<div class="no-photo">Kein Foto vorhanden</div>';
  }
  document.getElementById('lbTitle').textContent = pin.title;
  document.getElementById('lbMeta').textContent = `${formatTime(pin.createdAt)} · ${timeLeft(pin.createdAt)}`;
  document.getElementById('lightbox').classList.add('show');
};

document.getElementById('lightboxClose').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('show');
  currentLightboxId = null;
});

document.getElementById('lbDelete').addEventListener('click', () => {
  if (!currentLightboxId) return;
  if (!confirm('Diesen Pin wirklich löschen?')) return;
  pins = pins.filter(p => p.id !== currentLightboxId);
  savePins(pins);
  refreshAll();
  document.getElementById('lightbox').classList.remove('show');
  currentLightboxId = null;
  toast('Pin gelöscht');
});

// === GPS ===
function locate(showToast = true) {
  if (!navigator.geolocation) {
    toast('GPS nicht verfügbar');
    return Promise.reject();
  }
  return new Promise((resolve, reject) => {
    navigator.geolocation.getCurrentPosition(
      pos => {
        myPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        if (myMarker) map.removeLayer(myMarker);
        myMarker = L.marker([myPosition.lat, myPosition.lng], { icon: makeMeIcon(), interactive: false }).addTo(map);
        map.setView([myPosition.lat, myPosition.lng], 15, { animate: true });
        if (showToast) toast('Standort gefunden');
        resolve(myPosition);
      },
      err => { toast('Standort verweigert'); reject(err); },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  });
}

// === Modal & Foto ===
const modal = document.getElementById('modal');
const modalCoords = document.getElementById('modalCoords');
const titleInput = document.getElementById('titleInput');
const photoArea = document.getElementById('photoArea');
const photoLabel = document.getElementById('photoLabel');
const fileInput = document.getElementById('fileInput');
const colorSlider = document.getElementById('colorSlider');
const strengthSlider = document.getElementById('strengthSlider');
const previewBeam = document.getElementById('previewBeam');

// Live-Vorschau aktualisieren beim Schieben
function updatePreview() {
  const c = +colorSlider.value;
  const s = +strengthSlider.value;
  const color = urineColor(c);
  const w = beamWidth(s);
  // Strahl als gestrichelte Bogen-Linie vom Männchen zur Erde
  // Start bei (88, 65), Bogen über (160, 30) zum Auftreffpunkt (240, 65)
  previewBeam.setAttribute('d', 'M 88 65 Q 160 25 240 65');
  previewBeam.setAttribute('stroke', color);
  previewBeam.setAttribute('stroke-width', w);
  previewBeam.setAttribute('stroke-dasharray', `${Math.max(4, w*1.2)} ${Math.max(6, w*1.5)}`);
}
colorSlider.addEventListener('input', updatePreview);
strengthSlider.addEventListener('input', updatePreview);

function resetModal() {
  titleInput.value = '';
  pendingPhoto = null;
  photoArea.classList.remove('has-photo');
  photoArea.innerHTML = '';
  photoArea.appendChild(photoLabel);
  fileInput.value = '';
  colorSlider.value = 30;
  strengthSlider.value = 60;
  updatePreview();
}

document.getElementById('addBtn').addEventListener('click', async () => {
  resetModal();
  modal.classList.add('show');
  modalCoords.textContent = 'Position wird ermittelt...';
  try {
    await locate(false);
    modalCoords.textContent = `${myPosition.lat.toFixed(5)}, ${myPosition.lng.toFixed(5)}`;
    setTimeout(() => titleInput.focus(), 100);
  } catch (e) {
    modalCoords.textContent = 'Standort nicht verfügbar';
  }
});

photoArea.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  toast('Foto wird verkleinert...');
  try {
    const dataUrl = await compressImage(file);
    pendingPhoto = dataUrl;
    photoArea.classList.add('has-photo');
    photoArea.innerHTML = `<img src="${dataUrl}" alt=""><div class="replace-tag">Foto ändern</div>`;
    toast('Foto bereit');
  } catch (err) {
    toast('Foto konnte nicht geladen werden');
  }
});

document.getElementById('cancelBtn').addEventListener('click', () => {
  modal.classList.remove('show');
});

document.getElementById('saveBtn').addEventListener('click', () => {
  const title = titleInput.value.trim();
  if (!title) { toast('Bitte einen Titel eingeben'); return; }
  if (!myPosition) { toast('Kein Standort verfügbar'); return; }
  const colorVal = +colorSlider.value;
  const strengthVal = +strengthSlider.value;
  const pin = {
    id: 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
    title,
    lat: myPosition.lat,
    lng: myPosition.lng,
    createdAt: Date.now(),
    photo: pendingPhoto || null,
    color: urineColor(colorVal),
    strength: strengthVal
  };
  pins.push(pin);
  if (!savePins(pins)) {
    pins.pop();
    return;
  }
  refreshAll();
  modal.classList.remove('show');
  toast(pendingPhoto ? 'Pin mit Foto gespeichert' : 'Pin gespeichert · 24h sichtbar');
});

titleInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('saveBtn').click();
});

document.getElementById('locateBtn').addEventListener('click', () => locate(true));

// === Toast ===
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// === Init ===
updatePreview();
refreshAll();
locate(false).catch(() => {});
setInterval(refreshAll, 60 * 1000);
</script>
</body>
